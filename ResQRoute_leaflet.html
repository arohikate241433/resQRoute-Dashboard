<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ResQRoute — Surveillance Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#f5f7fa;color:#111827;font-size:13px;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#f0f2f6;}
::-webkit-scrollbar-thumb{background:#c5cad6;border-radius:2px;}

/* Animations */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
@keyframes slideIn{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #e8173a44}50%{box-shadow:0 0 24px #e8173a99}}
@keyframes vehiclePulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes popIn{from{transform:scale(.9) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;}
#navbar{background:#fff;border-bottom:1px solid #e2e6ee;padding:9px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px #0000000a;flex-shrink:0;z-index:1000;}
#body{display:flex;flex:1;overflow:hidden;}

/* Left panel */
#left{width:248px;background:#fff;border-right:1px solid #e2e6ee;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#left-header{padding:11px 13px 9px;border-bottom:1px solid #e2e6ee;flex-shrink:0;}
#vlist-wrap{flex:1;overflow-y:auto;padding:8px;}
#left-footer{padding:9px 8px;border-top:1px solid #e2e6ee;flex-shrink:0;}

/* Map */
#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

/* Right panel */
#right{width:282px;background:#fff;border-left:1px solid #e2e6ee;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#tabs{display:flex;border-bottom:1px solid #e2e6ee;padding:7px 8px;gap:3px;background:#f5f7fa;flex-shrink:0;}
#tab-content{flex:1;overflow-y:auto;padding:11px 10px;}
#telemetry{border-top:1px solid #e2e6ee;padding:8px 11px;background:#f5f7fa;flex-shrink:0;}

/* Search */
.search-wrap{position:relative;margin-bottom:8px;}
.search-wrap span{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#9ca3af;pointer-events:none;}
.search-input{width:100%;padding:7px 28px 7px 28px;background:#f5f7fa;border:1.5px solid #e2e6ee;border-radius:8px;font-size:11px;color:#111827;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:#3b5bdb;}
.search-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;font-size:15px;line-height:1;display:none;}

/* Multi-select chips */
#selected-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:0;}
.chip{display:flex;align-items:center;gap:4px;background:#eef1ff;border:1px solid #c5cffe;border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;color:#3b5bdb;cursor:pointer;transition:all .15s;}
.chip:hover{background:#e0e4ff;}
.chip-x{font-size:12px;line-height:1;color:#6b7280;}

/* Vehicle cards */
.vcard{transition:all .18s;cursor:pointer;border:1.5px solid transparent;border-radius:10px;background:#f9fafb;padding:9px 11px;margin-bottom:7px;box-shadow:0 1px 3px #0000000a;}
.vcard:hover{border-color:#c5cffe;background:#eef1ff;}
.vcard.sel{border-color:#3b5bdb;background:#eef1ff;}
.vcard.multi-sel{border-color:#0ead7a;background:#f0fdf8;}

/* Tabs */
.tab-btn{flex:1;padding:5px 2px;border-radius:6px;font-size:9px;font-weight:600;background:transparent;color:#6b7280;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;position:relative;}
.tab-btn.on{background:#3b5bdb;color:#fff;}
.tab-btn:hover:not(.on){background:#e8eaf0;}

/* Route/signal cards */
.rc{transition:all .18s;cursor:pointer;border-radius:10px;background:#f9fafb;border:1px solid #e2e6ee;padding:10px 11px;margin-bottom:7px;box-shadow:0 1px 3px #0000000a;}
.rc:hover,.rc.sel{border-color:#3b5bdb;background:#eef1ff;}

/* Alert rows */
.alert-row{animation:slideIn .22s ease;border-radius:9px;margin-bottom:6px;}

/* SOS */
.sos-btn{transition:all .18s;font-family:'DM Sans',sans-serif;cursor:pointer;}
.sos-btn:hover{transform:scale(1.04);}
.sos-btn.on{animation:glow .8s infinite;}

/* Live dot */
.live-dot{width:6px;height:6px;border-radius:50%;background:#0ead7a;animation:pulse 1.5s infinite;}

/* Map overlays */
.map-overlay{position:absolute;z-index:500;pointer-events:auto;}
#tracking-card{top:12px;left:12px;background:#fffffff5;border:1px solid #e2e6ee;border-radius:14px;padding:12px 15px;box-shadow:0 4px 24px #00000014;min-width:240px;backdrop-filter:blur(10px);animation:popIn .3s ease;}
#multi-panel{top:12px;left:12px;background:#fffffff5;border:1px solid #e2e6ee;border-radius:14px;padding:12px 15px;box-shadow:0 4px 24px #00000014;max-width:260px;backdrop-filter:blur(10px);animation:popIn .3s ease;display:none;}
#nearby-banner{bottom:14px;right:14px;background:#f0fdf8;border:1.5px solid #a7f3d0;border-radius:14px;padding:12px 14px;max-width:265px;box-shadow:0 4px 20px #0ead7a18;animation:popIn .3s ease;}
#zoom-ctrl{top:12px;right:12px;display:flex;flex-direction:column;gap:5px;}
#map-legend{bottom:14px;left:12px;background:#fffffff5;border:1px solid #e2e6ee;border-radius:9px;padding:6px 12px;display:flex;gap:12px;box-shadow:0 1px 4px #0000000f;}

/* Leaflet overrides */
.leaflet-control-zoom{border:1px solid #e2e6ee!important;border-radius:10px!important;box-shadow:0 2px 8px #00000018!important;overflow:hidden;}
.leaflet-control-zoom a{background:#fff!important;color:#6b7280!important;font-size:16px!important;width:32px!important;height:32px!important;line-height:32px!important;}
.leaflet-control-zoom a:hover{background:#f0f2f6!important;}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 20px #00000018!important;font-family:'DM Sans',sans-serif!important;}
.leaflet-popup-tip{display:none;}

/* Vehicle marker */
.v-marker-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.v-ring{position:absolute;border-radius:50%;animation:vehiclePulse 1.5s infinite;}
.v-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 10px #00000033;font-size:16px;z-index:1;position:relative;}

/* Comparison table */
.cmp-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;}
.cmp-table th{background:#f5f7fa;padding:6px 8px;text-align:left;color:#6b7280;font-weight:600;font-size:9px;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #e2e6ee;}
.cmp-table td{padding:7px 8px;border-bottom:1px solid #f3f4f6;color:#111827;}
.cmp-table tr:last-child td{border:none;}
</style>
</head>
<body>
<div id="app">

<!-- NAVBAR -->
<div id="navbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:30px;height:30px;background:linear-gradient(135deg,#e8173a,#f07000);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px #e8173a33;">🚨</div>
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#111827;">ResQRoute</div>
      <div style="font-size:9px;color:#9ca3af;letter-spacing:.8px;">SURVEILLANCE COMMAND CENTER</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="display:flex;align-items:center;gap:5px;background:#f0fdf8;border:1px solid #a7f3d0;border-radius:20px;padding:3px 10px;font-size:11px;">
      <div class="live-dot"></div>
      <span style="color:#0ead7a;font-weight:600;">LIVE</span>
    </div>
    <div id="clock" style="font-size:11px;color:#9ca3af;font-weight:500;"></div>
    <div style="font-size:11px;color:#4b5563;background:#f0f2f6;border-radius:20px;padding:4px 11px;border:1px solid #e2e6ee;">👤 Dispatch Officer</div>
  </div>
</div>

<!-- BODY -->
<div id="body">

<!-- LEFT PANEL -->
<div id="left">
  <div id="left-header">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
      <div>
        <div style="font-size:10px;font-weight:600;color:#9ca3af;letter-spacing:.8px;text-transform:uppercase;">Active Units</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;color:#111827;margin-top:1px;">
          3 <span style="font-size:12px;font-weight:400;color:#9ca3af;">/ 4</span>
        </div>
      </div>
      <div id="sel-count" style="display:none;background:#eef1ff;border:1px solid #c5cffe;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:#3b5bdb;"></div>
    </div>

    <!-- Multi-driver search -->
    <div class="search-wrap">
      <span>🔍</span>
      <input id="search" class="search-input" placeholder="Search driver, unit or type..." oninput="onSearch(this.value)" autocomplete="off"/>
      <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
    </div>

    <!-- Selected chips -->
    <div id="selected-chips"></div>

    <!-- Search dropdown -->
    <div id="search-dropdown" style="display:none;background:#fff;border:1.5px solid #c5cffe;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px #3b5bdb18;max-height:160px;overflow-y:auto;margin-bottom:4px;"></div>

    <!-- Mode indicator -->
    <div id="mode-bar" style="display:none;font-size:10px;color:#3b5bdb;font-weight:600;padding:4px 8px;background:#eef1ff;border-radius:6px;display:flex;align-items:center;justify-content:space-between;">
      <span id="mode-text"></span>
      <button onclick="clearAllSelected()" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;text-decoration:underline;">Clear</button>
    </div>
  </div>

  <div id="vlist-wrap"></div>

  <div id="left-footer">
    <button id="sosBtn" class="sos-btn" onclick="triggerSOS()" style="width:100%;background:#fff5f5;border:1.5px solid #e8173a;color:#e8173a;border-radius:9px;padding:8px;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:5px;">🆘 SOS Alert</button>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
      <button onclick="addAlert('critical','⚠️ Emergency broadcast sent to all units')" style="background:#fff8f0;border:1.5px solid #f07000;color:#f07000;border-radius:8px;padding:6px;font-weight:600;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;">🔔 Emergency</button>
      <button onclick="addAlert('info','📡 Broadcast notification dispatched')" style="background:#eef1ff;border:1.5px solid #c5cffe;color:#3b5bdb;border-radius:8px;padding:6px;font-weight:600;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;">📡 Broadcast</button>
    </div>
  </div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="map"></div>

  <!-- Tracking card (single mode) -->
  <div id="tracking-card" class="map-overlay"></div>

  <!-- Multi-vehicle panel -->
  <div id="multi-panel" class="map-overlay"></div>

  <!-- Nearby hospital -->
  <div id="nearby-banner" class="map-overlay">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;">
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:20px;">🏥</span>
        <div>
          <div style="font-weight:700;font-size:12px;color:#0ead7a;">Closer Hospital Detected</div>
          <div style="font-size:10px;color:#6ee7b7;">Smart rerouting suggestion</div>
        </div>
      </div>
      <button onclick="document.getElementById('nearby-banner').style.display='none'" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:16px;line-height:1;">×</button>
    </div>
    <div style="font-size:11px;color:#374151;margin-bottom:8px;line-height:1.6;"><strong>Choithram Hospital</strong> is 1.2km away — saves 2 min. 8 beds available.</div>
    <div style="display:flex;gap:6px;">
      <button onclick="notifyDriver()" style="flex:1;background:#0ead7a;border:none;border-radius:8px;padding:7px;color:#fff;font-weight:700;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">Notify Driver</button>
      <button onclick="document.getElementById('nearby-banner').style.display='none'" style="flex:1;background:#fff;border:1px solid #e2e6ee;border-radius:8px;padding:7px;color:#6b7280;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">Dismiss</button>
    </div>
  </div>

  <!-- Map legend -->
  <div id="map-legend" class="map-overlay">
    <div style="display:flex;align-items:center;gap:4px;font-size:10px;"><div style="width:7px;height:7px;border-radius:50%;background:#e8173a;"></div><span style="color:#6b7280;">Critical</span></div>
    <div style="display:flex;align-items:center;gap:4px;font-size:10px;"><div style="width:7px;height:7px;border-radius:50%;background:#f07000;"></div><span style="color:#6b7280;">En Route</span></div>
    <div style="display:flex;align-items:center;gap:4px;font-size:10px;"><div style="width:7px;height:7px;border-radius:50%;background:#0ead7a;"></div><span style="color:#6b7280;">Standby</span></div>
    <div style="display:flex;align-items:center;gap:4px;font-size:10px;"><div style="width:7px;height:7px;border-radius:50%;background:#3b5bdb;"></div><span style="color:#6b7280;">Route</span></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <div id="tabs">
    <button class="tab-btn on" id="t-routes"    onclick="switchTab('routes')">📍 Routes</button>
    <button class="tab-btn"    id="t-signals"   onclick="switchTab('signals')">🚦 Signals</button>
    <button class="tab-btn"    id="t-incidents" onclick="switchTab('incidents')">⚠️ Incidents</button>
    <button class="tab-btn"    id="t-alerts"    onclick="switchTab('alerts')" style="position:relative;">🔔 Alerts
      <span id="aBadge" style="position:absolute;top:1px;right:1px;width:13px;height:13px;background:#e8173a;border-radius:50%;font-size:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">3</span>
    </button>
  </div>
  <div id="tab-content"></div>
  <div id="telemetry">
    <div id="tLabel" style="font-size:9px;font-weight:600;color:#9ca3af;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px;">Live Telemetry — AMB-01</div>
    <div id="tGrid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;"></div>
  </div>
</div>

</div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
const PC = {critical:'#e8173a',high:'#f07000',standby:'#0ead7a',medium:'#e09000'};
const SC = {critical:'#e8173a',high:'#f07000',medium:'#e09000',low:'#0ead7a'};

const VEHICLES = [
  { id:'AMB-01', type:'Ambulance',  driver:'Rajan Mehta',  phone:'+91 98001 11111', status:'En Route',   speed:72, eta:'4 min', priority:'critical', from:'AIIMS Hospital',  to:'Sector 12 Accident',  emoji:'🚑', color:'#e8173a', latlng:[22.7196,75.8577], dest:[22.7350,75.8820] },
  { id:'AMB-02', type:'Ambulance',  driver:'Sunita Rao',   phone:'+91 98001 22222', status:'Standby',    speed:0,  eta:'—',     priority:'standby',  from:'Central Depot',   to:'—',                   emoji:'🚑', color:'#0ead7a', latlng:[22.7156,75.8700], dest:null },
  { id:'FIRE-01',type:'Fire Truck', driver:'Arvind Singh', phone:'+91 98001 33333', status:'Responding', speed:58, eta:'7 min', priority:'high',     from:'Fire Station 3',  to:'Industrial Zone B',   emoji:'🚒', color:'#f07000', latlng:[22.7230,75.8500], dest:[22.7050,75.8650] },
  { id:'POL-01', type:'Police',     driver:'Deepa Nair',   phone:'+91 98001 44444', status:'En Route',   speed:85, eta:'2 min', priority:'high',     from:'Police HQ',       to:'MG Road Incident',    emoji:'🚔', color:'#3b5bdb', latlng:[22.7100,75.8600], dest:[22.7180,75.8750] },
];

const INCIDENTS = [
  { type:'Accident',  loc:'MG Road Junction',  sev:'critical', time:'2 min ago',  latlng:[22.724,75.878], icon:'💥' },
  { type:'Roadblock', loc:'Sector 5 Bridge',   sev:'medium',   time:'8 min ago',  latlng:[22.718,75.855], icon:'🚧' },
  { type:'Flooding',  loc:'Old City Bypass',   sev:'low',      time:'15 min ago', latlng:[22.708,75.862], icon:'🌊' },
  { type:'Fire',      loc:'Industrial Zone B', sev:'high',     time:'1 min ago',  latlng:[22.731,75.843], icon:'🔥' },
];

const ROUTES = [
  {id:'R1',name:'Via MG Road',   eta:'4 min',dist:'3.2 km',rel:92,cong:'low',   sig:4},
  {id:'R2',name:'Via Ring Road', eta:'6 min',dist:'4.8 km',rel:87,cong:'medium',sig:2},
  {id:'R3',name:'Via NH3 Bypass',eta:'8 min',dist:'5.5 km',rel:95,cong:'low',   sig:1},
];

const SIGNALS = [
  {id:'S1',loc:'MG Road & AB Rd', status:'red',   queue:12},
  {id:'S2',loc:'Race Course Sq',  status:'green', queue:3},
  {id:'S3',loc:'Vijay Nagar',     status:'yellow',queue:7},
  {id:'S4',loc:'Palasia Chowk',   status:'red',   queue:18},
];

// Sample route waypoints (polylines for each vehicle)
const ROUTE_PATHS = {
  'AMB-01':  [[22.7196,75.8577],[22.7210,75.8620],[22.7240,75.8660],[22.7280,75.8700],[22.7310,75.8750],[22.7350,75.8820]],
  'FIRE-01': [[22.7230,75.8500],[22.7200,75.8540],[22.7160,75.8570],[22.7110,75.8610],[22.7050,75.8650]],
  'POL-01':  [[22.7100,75.8600],[22.7120,75.8640],[22.7140,75.8680],[22.7160,75.8720],[22.7180,75.8750]],
};

// ── STATE ─────────────────────────────────────────────────────────────
let selV = 0;                // single selected index
let selectedIDs = new Set(); // multi-select set
let activeTab = 'routes';
let selRoute = 'R1';
let sigOv = {S2:true};
let alerts = [
  {id:1,type:'critical',msg:'🔴 Fire at Industrial Zone B — unit dispatched',time:'1m ago'},
  {id:2,type:'warning', msg:'🟠 Heavy congestion on MG Road segment 3',time:'3m ago'},
  {id:3,type:'info',    msg:'🔵 AMB-01 ETA updated to 4 min',time:'5m ago'},
];
let liveSpeed = VEHICLES.map(v => v.speed);
const progress = VEHICLES.map((_,i) => i * 0.2);
const ANIM_SPEED = 0.0006;
let searchVal = '';
let mapMarkers = {};
let routeLines = {};
let animPaths = {};
let map;

// ── INIT MAP ──────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: [22.7196, 75.8577],
    zoom: 14,
    zoomControl: true,
    attributionControl: false,
  });

  // OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // Incident markers
  INCIDENTS.forEach(inc => {
    const el = document.createElement('div');
    el.style.cssText = `width:30px;height:30px;border-radius:50%;background:${SC[inc.sev]};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 10px ${SC[inc.sev]}66;cursor:pointer;`;
    el.innerHTML = inc.icon;
    el.title = `${inc.type} — ${inc.loc}`;
    const icon = L.divIcon({html: el.outerHTML, className:'', iconSize:[30,30], iconAnchor:[15,15]});
    L.marker(inc.latlng, {icon})
      .addTo(map)
      .bindPopup(`<div style="font-family:'DM Sans',sans-serif;padding:4px;">
        <div style="font-weight:700;color:${SC[inc.sev]};font-size:13px;">${inc.icon} ${inc.type}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:2px;">${inc.loc}</div>
        <div style="font-size:10px;color:#9ca3af;margin-top:2px;">🕐 ${inc.time}</div>
      </div>`, {closeButton:false, offset:[0,-10]});
  });

  // Route polylines
  VEHICLES.forEach((v,i) => {
    if (!ROUTE_PATHS[v.id]) return;
    const line = L.polyline(ROUTE_PATHS[v.id], {
      color: v.color,
      weight: 5,
      opacity: 0.0,
      dashArray: '10 6',
      lineCap: 'round',
      lineJoin: 'round',
    }).addTo(map);
    routeLines[v.id] = line;

    // Glow line
    const glow = L.polyline(ROUTE_PATHS[v.id], {
      color: v.color,
      weight: 14,
      opacity: 0.0,
    }).addTo(map);
    glow._isGlow = true;
    routeLines[v.id + '_glow'] = glow;

    // Destination marker
    if (v.dest) {
      const dEl = document.createElement('div');
      dEl.style.cssText = `width:18px;height:18px;border-radius:50%;background:${v.color};border:3px solid #fff;box-shadow:0 2px 8px ${v.color}66;`;
      const dIcon = L.divIcon({html: dEl.outerHTML, className:'', iconSize:[18,18], iconAnchor:[9,9]});
      L.marker(v.dest, {icon: dIcon}).addTo(map);
    }
  });

  // Vehicle markers + animation paths
  VEHICLES.forEach((v,i) => {
    const path = ROUTE_PATHS[v.id];
    animPaths[v.id] = path || null;

    const el = makeVehicleEl(v, false);
    const icon = L.divIcon({html: el, className:'', iconSize:[44,44], iconAnchor:[22,22]});
    const marker = L.marker(v.latlng, {icon, zIndexOffset: 1000})
      .addTo(map)
      .bindPopup(makePopup(v, i), {closeButton:false, offset:[0,-15]});

    marker.on('click', () => {
      selV = i;
      renderAll();
      highlightRoute(v.id);
    });

    mapMarkers[v.id] = marker;
  });

  // Show default route
  highlightRoute(VEHICLES[selV].id);

  // Start animation
  animateVehicles();
}

function makeVehicleEl(v, selected) {
  const size = selected ? 46 : 38;
  const ring = selected ? `<div style="position:absolute;width:${size+12}px;height:${size+12}px;border-radius:50%;border:2.5px solid ${v.color};opacity:.5;top:50%;left:50%;transform:translate(-50%,-50%);animation:vehiclePulse 1.8s infinite;"></div>` : '';
  return `<div style="position:relative;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;">
    ${ring}
    <div style="width:${size}px;height:${size}px;border-radius:50%;background:${v.color};border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:${selected?20:16}px;box-shadow:0 2px 12px ${v.color}55,${selected?`0 0 0 4px ${v.color}22`:''};z-index:1;">${v.emoji}</div>
  </div>`;
}

function makePopup(v, i) {
  return `<div style="font-family:'DM Sans',sans-serif;min-width:160px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <div style="width:28px;height:28px;border-radius:50%;background:${PC[v.priority]}18;border:1.5px solid ${PC[v.priority]}44;display:flex;align-items:center;justify-content:center;font-size:14px;">${v.emoji}</div>
      <div><div style="font-weight:700;font-size:13px;">${v.id}</div><div style="font-size:10px;color:#6b7280;">${v.driver}</div></div>

      ${v.to!=='—'?`<div>📍 ${v.to}</div>`:''}

    <button onclick="selV=${i};renderAll();highlightRoute('${v.id}')" style="margin-top:8px;width:100%;background:#3b5bdb;border:none;border-radius:7px;padding:6px;color:#fff;font-weight:600;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">Track This Unit</button>

// ── ROUTE HIGHLIGHT ───────────────────────────────────────────────────
function highlightRoute(vehicleId) {
  Object.keys(routeLines).forEach(id => {
    const line = routeLines[id];
    if (!line) return;
    if (id === vehicleId) {
      line.setStyle({opacity: 0.88, weight: 5});
    } else if (id === vehicleId + '_glow') {
      line.setStyle({opacity: 0.12, weight: 14});
    } else {
      line.setStyle({opacity: 0});
    }
  });
}

// ── VEHICLE ANIMATION ─────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function animateVehicles() {
  VEHICLES.forEach((v, i) => {
    const path = animPaths[v.id];
    if (!path || path.length < 2) return;

    progress[i] = (progress[i] + ANIM_SPEED) % 1;
    const t = progress[i];
    const n = path.length - 1;
    const seg = Math.min(Math.floor(t * n), n - 1);
    const f = t * n - seg;

    const lat = lerp(path[seg][0], path[seg+1][0], f);
    const lng = lerp(path[seg][1], path[seg+1][1], f);

    mapMarkers[v.id].setLatLng([lat, lng]);

    // Update popup if open
    const isSelected = (selV === i && selectedIDs.size === 0);
    if (isSelected) {
      updateTrackingCard();
    }
  });

  requestAnimationFrame(animateVehicles);
}

// ── MULTI-SELECT SEARCH ───────────────────────────────────────────────
function onSearch(val) {
  searchVal = val;
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';

  if (!val.trim()) {
    document.getElementById('search-dropdown').style.display = 'none';
    renderVList();
    return;
  }

  const q = val.toLowerCase();
  const results = VEHICLES.filter(v =>
    !selectedIDs.has(v.id) && (
      v.driver.toLowerCase().includes(q) ||
      v.id.toLowerCase().includes(q) ||
      v.type.toLowerCase().includes(q) ||
      v.status.toLowerCase().includes(q)
    )
  );

  const dd = document.getElementById('search-dropdown');
  if (!results.length) {
    dd.innerHTML = `<div style="padding:10px 12px;font-size:11px;color:#9ca3af;">No results found</div>`;
  } else {
    dd.innerHTML = results.map(v => `
      <div onclick="addToSelection('${v.id}')" style="display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:background .15s;" onmouseover="this.style.background='#f5f7ff'" onmouseout="this.style.background=''">
        <div style="width:26px;height:26px;border-radius:50%;background:${PC[v.priority]}18;border:1.5px solid ${PC[v.priority]}44;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">${v.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:12px;">${highlight(v.driver, q)}</div>
          <div style="font-size:10px;color:#9ca3af;">${highlight(v.id, q)} · ${v.type}</div>
        </div>
        <div style="font-size:9px;font-weight:600;background:${PC[v.priority]}18;color:${PC[v.priority]};border-radius:4px;padding:2px 6px;">${v.status}</div>
      </div>
    `).join('');
  }
  dd.style.display = 'block';
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) + `<mark style="background:#c5cffe55;border-radius:2px;padding:0 1px;">${text.slice(idx, idx+q.length)}</mark>` + text.slice(idx+q.length);
}

function addToSelection(id) {
  selectedIDs.add(id);
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-dropdown').style.display = 'none';
  searchVal = '';
  renderAll();
  updateMapForMulti();
}

function removeFromSelection(id) {
  selectedIDs.delete(id);
  renderAll();
  if (selectedIDs.size === 0) {
    highlightRoute(VEHICLES[selV].id);
    document.getElementById('multi-panel').style.display = 'none';
    document.getElementById('tracking-card').style.display = 'block';
  } else {
    updateMapForMulti();
  }
}

function clearAllSelected() {
  selectedIDs.clear();
  searchVal = '';
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-dropdown').style.display = 'none';
  renderAll();
  highlightRoute(VEHICLES[selV].id);
  document.getElementById('multi-panel').style.display = 'none';
  document.getElementById('tracking-card').style.display = 'block';
}

function clearSearch() {
  searchVal = '';
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-dropdown').style.display = 'none';
  renderVList();
}

function updateMapForMulti() {
  if (selectedIDs.size === 0) return;

  // Show all selected routes, hide others
  Object.keys(routeLines).forEach(id => {
    const line = routeLines[id];
    const isGlow = id.endsWith('_glow');
    const baseId = isGlow ? id.replace('_glow','') : id;
    const v = VEHICLES.find(v => v.id === baseId);
    if (!v) return;
    if (selectedIDs.has(baseId)) {
      line.setStyle({opacity: isGlow ? 0.12 : 0.88, weight: isGlow ? 14 : 5});
    } else {
      line.setStyle({opacity: 0});
    }
  });

  // Update marker visuals
  VEHICLES.forEach((v, i) => {
    const el = makeVehicleEl(v, selectedIDs.has(v.id));
    const icon = L.divIcon({html: el, className:'', iconSize:[44,44], iconAnchor:[22,22]});
    mapMarkers[v.id].setIcon(icon);
  });

  // Fit map to selected vehicles
  const selectedVehicles = VEHICLES.filter(v => selectedIDs.has(v.id));
  if (selectedVehicles.length > 1) {
    const bounds = L.latLngBounds(selectedVehicles.map(v => v.latlng));
    map.fitBounds(bounds.pad(0.3), {animate:true, duration:0.8});
  }

  // Show multi panel, hide single
  document.getElementById('tracking-card').style.display = 'none';
  document.getElementById('multi-panel').style.display = 'block';
  updateMultiPanel();
}

function selectVehicle(i) {
  if (selectedIDs.size > 0) {
    // In multi-mode, toggle
    const id = VEHICLES[i].id;
    if (selectedIDs.has(id)) {
      removeFromSelection(id);
    } else {
      addToSelection(id);
    }
  } else {
    selV = i;
    const v = VEHICLES[i];
    map.flyTo(v.latlng, 15, {animate:true, duration:0.8});
    highlightRoute(v.id);
    document.getElementById('multi-panel').style.display = 'none';
    document.getElementById('tracking-card').style.display = 'block';
    // Update marker icons
    VEHICLES.forEach((vv,ii) => {
      const el = makeVehicleEl(vv, ii === i);
      const icon = L.divIcon({html:el, className:'', iconSize:[44,44], iconAnchor:[22,22]});
      mapMarkers[vv.id].setIcon(icon);
    });
    renderAll();
  }
}

        const st = ov ? 'green' : s.status;
        const dc = st==='green'?'#0ead7a':st==='red'?'#e8173a':'#e09000';
        return `<div style="background:#f9fafb;border:1.5px solid ${ov?'#a7f3d0':'#e2e6ee'};border-radius:10px;padding:10px 11px;margin-bottom:7px;box-shadow:0 1px 3px #0000000a;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div><div style="font-weight:700;font-size:12px;">${s.id}</div><div style="font-size:10px;color:#6b7280;margin-top:1px;">${s.loc}</div></div>
            <div style="display:flex;align-items:center;gap:5px;">
              <div style="width:10px;height:10px;border-radius:50%;background:${dc};box-shadow:0 0 5px ${dc}88;${ov?'animation:pulse .9s infinite':''}"></div>
              <span style="font-size:9px;color:${dc};font-weight:700;text-transform:uppercase;">${ov?'Override':st}</span>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px;">
            <span style="font-size:10px;color:#6b7280;">Queue: <strong style="color:${s.queue>10?'#f07000':'#111827'};">${s.queue} vehicles</strong></span>
            <button onclick="toggleSig('${s.id}')" style="font-size:9px;background:${ov?'#f0fdf8':'#eef1ff'};border:1px solid ${ov?'#a7f3d0':'#c5cffe'};color:${ov?'#0ead7a':'#3b5bdb'};border-radius:5px;padding:3px 8px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif;">${ov?'✓ Overridden':'Override'}</button>
          </div>
        </div>`;
      }).join('')}
      <div style="background:#f0fdf8;border:1px solid #a7f3d0;border-radius:9px;padding:9px 11px;">
        <div style="font-size:11px;color:#0ead7a;font-weight:700;margin-bottom:3px;">🟢 ${Object.values(sigOv).filter(Boolean).length} signals overridden</div>
        <div style="font-size:10px;color:#059669;line-height:1.5;">Emergency priority active. Auto-reverts after vehicle passage.</div>
      </div>`;
  } else if (activeTab === 'incidents') {
    el.innerHTML = `
      <div style="font-size:10px;font-weight:600;color:#9ca3af;letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px;">Detected Incidents</div>
      ${INCIDENTS.map(inc => `<div style="background:#f9fafb;border:1px solid ${SC[inc.sev]}22;border-left:3px solid ${SC[inc.sev]};border-radius:10px;padding:10px 11px;margin-bottom:7px;box-shadow:0 1px 3px #0000000a;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div><div style="font-weight:700;font-size:12px;color:${SC[inc.sev]};">${inc.icon} ${inc.type}</div><div style="font-size:10px;color:#6b7280;margin-top:1px;">${inc.loc}</div></div>
          <div style="font-size:9px;background:${SC[inc.sev]}14;color:${SC[inc.sev]};border:1px solid ${SC[inc.sev]}22;border-radius:4px;padding:2px 7px;font-weight:600;text-transform:capitalize;">${inc.sev}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px;">
          <span style="font-size:9px;color:#9ca3af;">🕐 ${inc.time}</span>
          <div style="display:flex;gap:4px;">
            <button onclick="addAlert('warning','🔄 Rerouting around ${inc.type} at ${inc.loc}')" style="font-size:9px;background:#fff8f0;border:1px solid #f07000;color:#f07000;border-radius:4px;padding:3px 7px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif;">Reroute</button>
            <button style="font-size:9px;background:#f3f4f6;border:1px solid #e5e7eb;color:#6b7280;border-radius:4px;padding:3px 7px;cursor:pointer;font-family:'DM Sans',sans-serif;">Details</button>
          </div>
        </div>
      </div>`).join('')}`;
  } else {
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
        <div style="font-size:10px;font-weight:600;color:#9ca3af;letter-spacing:.7px;text-transform:uppercase;">Live Alerts</div>
        ${alerts.length ? `<button onclick="clearAlerts()" style="font-size:9px;color:#9ca3af;background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;">Clear all</button>` : ''}
      </div>
      ${!alerts.length ? '<div style="text-align:center;color:#9ca3af;font-size:11px;padding:28px 0;">✅ All clear — no active alerts</div>' : ''}
      ${alerts.map(a => `<div class="alert-row" style="background:${a.type==='critical'?'#fff5f5':a.type==='warning'?'#fffbf0':'#f0f4ff'};border:1px solid ${a.type==='critical'?'#fecaca':a.type==='warning'?'#fde68a':'#c5cffe'};border-left:3px solid ${a.type==='critical'?'#e8173a':a.type==='warning'?'#e09000':'#3b5bdb'};padding:9px 11px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="font-size:11px;flex:1;line-height:1.6;color:#111827;">${a.msg}</div>
          <button onclick="dismissAlert(${a.id})" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:13px;margin-left:5px;">×</button>
        </div>
        <div style="font-size:9px;color:#9ca3af;margin-top:3px;">${a.time}</div>
      </div>`).join('')}`;
    const b = document.getElementById('aBadge');
    b.textContent = alerts.length;
    b.style.display = alerts.length ? 'flex' : 'none';
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────
function toggleSig(id) { sigOv[id]=!sigOv[id]; if(sigOv[id]) addAlert('info',`🚦 Signal ${id} overridden — emergency green`); renderTab(); }
function addAlert(type, msg) { alerts.unshift({id:Date.now(),type,msg,time:'now'}); if(activeTab==='alerts') renderTab(); const b=document.getElementById('aBadge'); b.textContent=alerts.length; b.style.display='flex'; }
function dismissAlert(id) { alerts=alerts.filter(a=>a.id!==id); renderTab(); }
function clearAlerts() { alerts=[]; renderTab(); }
function notifyDriver() { document.getElementById('nearby-banner').style.display='none'; addAlert('info','✅ AMB-01 driver notified — Choithram Hospital detour (saves 2 min)'); }

function triggerSOS() {
  const b = document.getElementById('sosBtn');
  b.classList.add('on'); b.innerHTML='🚨 SOS ACTIVE'; b.style.background='#e8173a'; b.style.color='#fff';
  addAlert('critical','🚨 SOS ACTIVATED — All units and dispatch notified');
  setTimeout(()=>{b.classList.remove('on');b.innerHTML='🆘 SOS Alert';b.style.background='#fff5f5';b.style.color='#e8173a';},4000);
}

function renderAll() {
  renderChips();
  renderVList();
  updateTrackingCard();
  renderTelemetry();
  renderTab();
  if (selectedIDs.size > 0) updateMultiPanel();
}

function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

// ── BOOT ──────────────────────────────────────────────────────────────
tick(); setInterval(tick, 1000);
initMap();
renderAll();

// Live speed updates
setInterval(() => {
  liveSpeed = liveSpeed.map((s,i) => s>0 ? Math.max(48,Math.min(97,s+Math.round((Math.random()-.5)*9))) : 0);
  updateTrackingCard();
  renderTelemetry();
  if (selectedIDs.size > 0) updateMultiPanel();
}, 2500);

// Close dropdown on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#left-header')) {
    document.getElementById('search-dropdown').style.display = 'none';
  }
});
</script>
</body>
</html>
